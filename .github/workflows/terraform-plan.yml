name: Terraform Plan

# Runs on every PR and can be triggered manually.
# Posts the plan output as a PR comment so reviewers can see exactly what will change.

on:
  pull_request:
    paths:
      - 'terraform/**'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write # needed to post PR comments
  id-token: write # enables GitHub OIDC JWT for Bella manager token exchange

jobs:
  plan:
    name: terraform plan
    runs-on: ubuntu-latest

    env:
      TF_IN_AUTOMATION: true

      # AWS credentials — these can also be stored in Bella (as AWS_ACCESS_KEY_ID /
      # AWS_SECRET_ACCESS_KEY secrets) to achieve zero GitHub secrets entirely.
      AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}

      # Non-sensitive Terraform variables — set as GitHub Variables (not secrets)
      TF_VAR_bella_baxter_url: ${{ vars.BELLA_BAXTER_URL }}
      TF_VAR_aws_region: ${{ vars.AWS_REGION || 'us-east-1' }}
      TF_VAR_project_name: ${{ vars.PROJECT_NAME || 'lmns' }}
      TF_VAR_app_name: ${{ vars.APP_NAME || 'look-ma-no-secrets-demo' }}
      TF_VAR_ami_id: ${{ vars.AMI_ID || 'ami-0905a3c97561e0b69' }}
      TF_VAR_bella_provider_slug: ${{ vars.BELLA_PROVIDER_SLUG }}

      # bella run resolves project+env automatically from GET /api/v1/keys/me —
      # the OIDC-issued token already encodes which environment it's scoped to.
      # No BELLA_BAXTER_PROJECT / BELLA_BAXTER_ENV variables needed.

    steps:
      - uses: actions/checkout@v4

      - uses: Cosmic-Chimps/bella-baxter-setup-action@main
        with:
          oidc: 'true'
        env:
          BELLA_BAXTER_URL: https://api.bella-baxter.io
          BELLA_BAXTER_DEBUG: '1'
          BELLA_BAXTER_TENANT: ${{ vars.BELLA_BAXTER_TENANT }}
          BELLA_BAXTER_PROJECT: ${{ vars.BELLA_BAXTER_PROJECT }}
          BELLA_BAXTER_ENV: ${{ vars.BELLA_BAXTER_ENV }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '~1.10'

      - name: Terraform Init
        id: init
        working-directory: terraform
        run: |
          bella run -- sh -c '
            terraform init -upgrade \
              -backend-config="bucket=${TF_STATE_BUCKET}" \
              -backend-config="key=${TF_STATE_KEY}" \
              -backend-config="region=${AWS_REGION}"
          '

      - name: Terraform Validate
        id: validate
        working-directory: terraform
        run: terraform validate -no-color

      - name: Terraform Plan
        id: plan
        working-directory: terraform
        run: bella run -- sh -c 'terraform plan -no-color -out=tfplan 2>&1 | tee plan.txt'
        continue-on-error: true

      - name: Post plan as PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('terraform/plan.txt', 'utf8');
            const maxLen = 65000;
            const truncated = plan.length > maxLen
              ? plan.slice(0, maxLen) + '\n\n...[truncated]'
              : plan;

            const outcome = '${{ steps.plan.outcome }}';
            const emoji   = outcome === 'success' ? '✅' : '❌';

            const body = [
              `## ${emoji} Terraform Plan — \`${{ github.head_ref }}\``,
              '',
              '<details><summary>Show plan</summary>',
              '',
              '```terraform',
              truncated,
              '```',
              '</details>',
              '',
              `**Validate:** \`${{ steps.validate.outcome }}\`  |  **Plan:** \`${outcome}\``,
              '',
              `> Triggered by @${{ github.actor }} · [run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})`,
            ].join('\n');

            // Update existing comment or create new one
            const marker = '## ✅ Terraform Plan';
            const markerFail = '## ❌ Terraform Plan';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c =>
              c.body.includes('Terraform Plan') && c.user.type === 'Bot'
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Fail if plan failed
        if: steps.plan.outcome == 'failure'
        run: exit 1
